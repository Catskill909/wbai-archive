# For local runs and as a reference for Coolify's "Docker Compose" deploy type.
services:
  wbai-archive:
    build: .
    image: wbai-archive:latest
    container_name: wbai-archive
    restart: unless-stopped
    environment:
      - PORT=8080
      - NODE_ENV=production
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
